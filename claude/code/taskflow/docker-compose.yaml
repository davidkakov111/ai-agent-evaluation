services:
  app:
    env_file:
      - .env.docker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/taskflow.db
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env.docker}
      - AUTH_TRUST_HOST=true
    volumes:
      - taskflow-data:/data
    restart: unless-stopped

volumes:
  taskflow-data:
